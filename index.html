<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Matrix Numbers</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// الأرقام (0 و 1)
const numbers = "01";

// حجم الخط
const fontSize = 16;
const columns = canvas.width / fontSize;

// مصفوفة لتحديد مكان النزول
const drops = [];
for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function draw() {
    // خلفية شفافة قليلاً لعمل تأثير الحركة
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0"; // أخضر
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = numbers[Math.floor(Math.random() * numbers.length)];
        
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        // إعادة من الأعلى عشوائياً
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);

// تحديث الحجم عند تغيير الشاشة
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
